<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="script-src 'self';" />
    <link
      rel="stylesheet"
      href="/speed-highlight/dist/themes/visual-studio-dark.css"
    />
    <link rel="stylesheet" href="./sidepanel.css" />
  </head>
  <body>
    <form id="fileBar" hidden>
      <input
        id="fileNameInput"
        type="text"
        inputmode="text"
        autocomplete="off"
        autocapitalize="off"
        spellcheck="false"
      />
    </form>
    <div id="root">Loading…</div>
    <div id="menuContainer">
      <button
        id="burger"
        type="button"
        aria-haspopup="true"
        aria-expanded="false"
        aria-controls="burgerMenu"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="#c7c7c7"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M4 5h16" />
          <path d="M4 12h16" />
          <path d="M4 19h16" />
        </svg>
      </button>
      <div id="burgerMenu" role="menu" aria-hidden="true">
        <button
          class="menuItem"
          type="button"
          role="menuitem"
          data-action="page"
        >
          Page
        </button>

        <div class="menuGroup" data-group="scripts">
          <button
            class="menuItem menuToggle"
            type="button"
            aria-expanded="false"
            aria-controls="menu-scripts"
            data-toggle="scripts"
          >
            Scripts
          </button>
          <div class="submenu" id="menu-scripts" aria-hidden="true"></div>
        </div>

        <div class="menuGroup" data-group="stylesheets">
          <button
            class="menuItem menuToggle"
            type="button"
            aria-expanded="false"
            aria-controls="menu-stylesheets"
            data-toggle="stylesheets"
          >
            Stylesheets
          </button>
          <div class="submenu" id="menu-stylesheets" aria-hidden="true"></div>
        </div>

        <div class="menuGroup" data-group="images">
          <button
            class="menuItem menuToggle"
            type="button"
            aria-expanded="false"
            aria-controls="menu-images"
            data-toggle="images"
          >
            Images
          </button>
          <div class="submenu" id="menu-images" aria-hidden="true"></div>
        </div>

        <div class="menuGroup" data-group="extras" hidden>
          <button
            class="menuItem menuToggle"
            type="button"
            aria-expanded="false"
            aria-controls="menu-extras"
            data-toggle="extras"
          >
            Extras
          </button>
          <div class="submenu" id="menu-extras" aria-hidden="true"></div>
        </div>
      </div>
    </div>
    <script type="module" src="./sidepanel.js"></script>
  </body>
</html>
